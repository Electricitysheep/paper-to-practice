name: Link Check

# Catches the #1 credibility killer for a curated list: dead links.
# - Every push / PR that touches Markdown: fast OFFLINE check (internal links
#   and anchors must resolve). This is deterministic and never flaky.
# - Monthly (and on-demand): FULL check including external URLs (arXiv, DOIs).
#   If anything is broken, it opens/updates a tracking issue.

on:
  push:
    paths: ['**/*.md']
  pull_request:
    paths: ['**/*.md']
  schedule:
    - cron: '0 6 1 * *'   # 06:00 UTC on the 1st of each month
  workflow_dispatch:

permissions:
  contents: read

jobs:
  internal-links:
    name: Internal links (offline, blocking)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check relative links & anchors
        uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --no-progress './**/*.md'
          fail: true   # a broken internal link fails the build

  external-links:
    name: External links (full, monthly)
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Check all links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # Retry a couple of times and accept rate-limit/partial codes so a
          # temporarily slow arXiv doesn't create false alarms.
          args: >-
            --no-progress
            --max-retries 2
            --retry-wait-time 5
            --accept 200,206,429
            --exclude-mail
            './**/*.md'
          fail: false   # don't fail the job; report via an issue instead
      - name: Open an issue if links are broken
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 Broken links detected"
          content-filepath: ./lychee/out.md
          labels: broken-link, automated
